<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>旅游记账 - 设置</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <div class="navbar">
    <div style="display:flex;align-items:center;">
      <button class="navbar-back" id="backBtn">◀</button>
      <h1>设置</h1>
    </div>
    <div></div>
  </div>

  <div class="container">
    <!-- 账号管理 -->
    <div class="section-title">🔐 账号管理</div>
    <div class="card">
      <div class="card-meta" style="margin-bottom:10px;">账号、密码与用户权限统一在续费雷达中维护。</div>
      <a class="btn btn-outline btn-block" href="/expiry/settings.html">前往续费雷达设置中心</a>
    </div>

    <!-- 支付人管理 -->
    <div class="section-title">👤 支付人管理</div>
    <div class="card">
      <div class="card-meta" style="margin-bottom:10px;">标记为“账单使用中”的支付人不可删除</div>
      <div class="form-row">
        <div class="form-group" style="flex:1;">
          <input class="form-input" type="text" id="newPayerName" placeholder="新增支付人姓名">
        </div>
        <button class="btn btn-accent" id="addPayerBtn">添加</button>
      </div>
      <div id="payerList" class="manage-list"></div>
    </div>

    <!-- 类别管理 -->
    <div class="section-title">📂 类别管理</div>
    <div class="card">
      <div class="card-meta" style="margin-bottom:10px;">标记为“账单使用中”的类别不可删除</div>
      <div class="form-row">
        <div class="form-group" style="flex:1;">
          <input class="form-input" type="text" id="newCategoryName" placeholder="新增类别名称">
        </div>
        <button class="btn btn-accent" id="addCategoryBtn">添加</button>
      </div>
      <div id="categoryList" class="manage-list"></div>
    </div>
  </div>

  <!-- 编辑模态框 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="editModalTitle">编辑</div>
        <button class="modal-close" id="closeEditModal">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label" id="editLabel">名称</label>
        <input class="form-input" type="text" id="editInput">
      </div>
      <button class="btn btn-primary btn-block" id="saveEditBtn">保存</button>
    </div>
  </div>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/settings.js"></script>
</body>
</html>
