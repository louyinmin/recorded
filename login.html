<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>旅游记账 - 登录</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">✈️</div>
    <div class="login-title">旅游记账</div>
    <div class="login-subtitle">记录每一次旅途的花销</div>
    <div class="login-card">
      <div class="form-group">
        <label class="form-label">账号</label>
        <input class="form-input" type="text" id="username" placeholder="请输入账号" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" type="password" id="password" placeholder="请输入密码">
      </div>
      <div id="loginError" class="form-error">账号或密码错误</div>
      <button class="btn btn-primary btn-block" id="loginBtn" style="margin-top:8px;">登 录</button>
      <a class="btn btn-outline btn-block" href="/" style="margin-top:10px;">返回首页</a>
    </div>
  </div>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
