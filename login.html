<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>生活航迹 - 登录</title>
  <link rel="stylesheet" href="assets/css/style.css?v=life-login-image-2">
</head>
<body class="life-login-body">
  <main class="life-login-shell">
    <section class="life-login-hero" aria-label="生活航迹登录视觉海报">
      <img class="life-login-hero-image" src="assets/img/life-login-hero-left.png?v=2" alt="">
    </section>

    <section class="life-login-panel" aria-label="账号入口">
      <header class="life-login-panel-head">
        <a href="/" class="life-login-home">返回首页</a>
        <div>
          <span>2026-05-13 周三</span>
          <strong>晴 22℃</strong>
        </div>
      </header>

      <div class="life-login-product">
        <span class="life-login-logo-mark"></span>
        <div>
          <strong>生活航迹</strong>
          <p>你的时间河流，私密的人生操作系统</p>
        </div>
      </div>

      <div class="life-login-card">
        <div id="lifeAuthView"></div>
        <div id="loginError" class="form-error life-login-error" role="alert"></div>
      </div>

      <aside class="life-login-note" aria-label="隐私与数据说明">
        <strong>仅自己可见<span>你的数据只属于你</span></strong>
        <strong>本地优先<span>数据优先存储在本地</span></strong>
        <strong>私密归档<span>自动备份，长久保存</span></strong>
      </aside>

      <p class="life-login-demo">演示账号：<b>louise@example.com</b> / <b>life2026</b></p>
    </section>
  </main>

  <script src="assets/js/life-account.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
