<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Lou 系统入口</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: rgba(255, 255, 255, 0.84);
      --line: rgba(24, 88, 126, 0.1);
      --text: #0f2138;
      --muted: #5f738b;
      --travel-a: #3a7eff;
      --travel-b: #1f57cf;
      --expiry-a: #15a7b8;
      --expiry-b: #06788d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(58, 126, 255, 0.18), transparent 32%),
        radial-gradient(circle at 90% 8%, rgba(21, 167, 184, 0.22), transparent 28%),
        linear-gradient(140deg, #f7fbff 0%, var(--bg) 55%, #e6edf5 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, var(--line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--line) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
      opacity: 0.35;
    }

    .entry-shell {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 24px;
      padding: 30px;
      backdrop-filter: blur(16px);
      box-shadow:
        0 20px 60px rgba(14, 31, 52, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      position: relative;
      z-index: 1;
    }

    .entry-head {
      margin-bottom: 22px;
    }

    .entry-kicker {
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1f6ca0;
      font-size: 12px;
      font-weight: 600;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(26px, 4.8vw, 40px);
      line-height: 1.1;
    }

    .entry-sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .entry-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .entry-card {
      border-radius: 18px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 12px 26px rgba(18, 44, 71, 0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .entry-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 30px rgba(18, 44, 71, 0.12);
    }

    .entry-title {
      margin: 0;
      font-size: 24px;
    }

    .entry-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .entry-pill {
      width: fit-content;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 6px 10px;
      color: #fff;
      font-weight: 600;
    }

    .entry-pill.travel {
      background: linear-gradient(120deg, var(--travel-a), var(--travel-b));
    }

    .entry-pill.expiry {
      background: linear-gradient(120deg, var(--expiry-a), var(--expiry-b));
    }

    .entry-btn {
      margin-top: auto;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .entry-btn.travel {
      background: linear-gradient(120deg, var(--travel-a), var(--travel-b));
    }

    .entry-btn.expiry {
      background: linear-gradient(120deg, var(--expiry-a), var(--expiry-b));
    }

    .entry-foot {
      margin-top: 18px;
      color: #54708d;
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .entry-shell {
        padding: 22px;
        border-radius: 18px;
      }

      .entry-grid {
        grid-template-columns: 1fr;
      }

      .entry-card {
        padding: 18px;
      }

      .entry-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="entry-shell">
    <header class="entry-head">
      <div class="entry-kicker">Console Entry</div>
      <h1>系统入口</h1>
      <p class="entry-sub">选择要进入的模块，旅游记账与续费雷达互相独立、分别登录。</p>
    </header>

    <section class="entry-grid">
      <article class="entry-card">
        <span class="entry-pill travel">Travel Accounting</span>
        <h2 class="entry-title">旅游记账</h2>
        <p class="entry-copy">管理每次旅行的支出明细，支持分类统计、支付人分摊与导出。</p>
        <a class="entry-btn travel" href="/login.html">进入旅游记账</a>
      </article>

      <article class="entry-card">
        <span class="entry-pill expiry">Expiry Radar</span>
        <h2 class="entry-title">续费雷达</h2>
        <p class="entry-copy">管理各类会员与服务到期日，查看月度/年度预计支出并接收提醒。</p>
        <a class="entry-btn expiry" href="/expiry/login.html">进入续费雷达</a>
      </article>
    </section>

    <div class="entry-foot">提示：后续可直接收藏各模块登录页，首页作为统一入口。</div>
  </main>
</body>
</html>
