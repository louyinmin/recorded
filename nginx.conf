server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    # 静态文件根目录（部署时根据实际路径修改）
    root /home/user/recorded;
    index home.html;

    # 静态文件优先由 nginx 服务；已搬到 projects/ 的兼容路径交给 Flask 解析。
    location / {
        try_files $uri $uri/ @recorded_static;
    }

    location @recorded_static {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 请求反向代理到 Flask 后端
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Court Deck stays isolated from the NBA and Timing API prefixes.
    location /nbagame/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 禁止访问数据库文件
    location ~ \.db$ {
        deny all;
    }

    # 禁止访问 .py 源文件
    location ~ \.py$ {
        deny all;
    }

    # 禁止访问 .sh 脚本
    location ~ \.sh$ {
        deny all;
    }
}
