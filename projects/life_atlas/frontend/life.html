<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>生活航迹</title>
  <link rel="stylesheet" href="/life/assets/css/life.css?v=20260701-watch-link-default-1">
</head>
<body class="life-body">
  <div class="life-shell">
    <aside class="life-sidebar" aria-label="生活航迹导航">
      <div class="life-profile">
        <div class="life-avatar">L</div>
        <strong>Louise</strong>
        <span>记录生活，理解自己</span>
      </div>

      <nav class="life-nav">
        <button class="life-nav-item active" type="button" data-view="timeline"><span class="life-svg-icon icon-flow"></span>生活航迹</button>
        <button class="life-nav-item" type="button" data-view="life-axis"><span class="life-svg-icon icon-timeline"></span>人生时间轴</button>
        <button class="life-nav-item" type="button" data-view="decisions"><span class="life-svg-icon icon-decision"></span>决策档案馆</button>
        <button class="life-nav-item" type="button" data-view="mood"><span class="life-svg-icon icon-mood"></span>情绪天气站</button>
        <button class="life-nav-item" type="button" data-view="relationships"><span class="life-svg-icon icon-relationship"></span>关系温度</button>
        <button class="life-nav-item" type="button" data-view="wishes"><span class="life-svg-icon icon-wish"></span>愿望冷却箱</button>
        <button class="life-nav-item" type="button" data-view="watch"><span class="life-svg-icon icon-watch"></span>观影墙</button>
        <button class="life-nav-item" type="button" data-view="monthly"><span class="life-svg-icon icon-monthly"></span>本月值得记住</button>
      </nav>

      <nav class="life-nav life-nav-secondary">
        <button class="life-nav-item" type="button" data-view="projects" hidden aria-hidden="true"><span class="life-svg-icon icon-project"></span>项目与目标</button>
        <button class="life-nav-item" type="button" data-view="health" hidden aria-hidden="true"><span class="life-svg-icon icon-health"></span>健康与身体</button>
        <button class="life-nav-item" type="button" data-view="review" hidden aria-hidden="true"><span class="life-svg-icon icon-review"></span>复盘与回顾</button>
        <button class="life-nav-item" type="button" data-view="resources" hidden aria-hidden="true"><span class="life-svg-icon icon-resource"></span>资源库</button>
        <button class="life-nav-item" type="button" data-view="profile"><span class="life-svg-icon icon-profile"></span>个人档案</button>
      </nav>

      <div class="life-sidebar-foot">
        <button class="life-plain-btn" type="button"><span class="life-svg-icon icon-settings"></span>设置</button>
        <button class="life-plain-btn" type="button"><span class="life-svg-icon icon-trash"></span>回收站</button>
      </div>
    </aside>

    <main class="life-app">
      <header class="life-topbar">
        <div>
          <div class="life-date" id="lifeTopDate">--</div>
          <h1 id="lifeTitle">生活航迹</h1>
        </div>
        <div class="life-topbar-actions">
          <label class="life-search">
            <span class="life-svg-icon icon-search"></span>
          <input id="lifeSearch" type="search" placeholder="搜索记录、地点、人物、决策...">
        </label>
        <button class="life-primary-btn" type="button" data-action="go-add">+ 添加一刻</button>
        <button class="life-secondary-btn life-account-entry" type="button" data-account-action="profile">Louise</button>
        <button class="life-secondary-btn life-logout-entry" type="button" data-account-action="logout-top" hidden>退出登录</button>
        <button class="life-icon-btn" type="button" aria-label="日历"><span class="life-svg-icon icon-monthly"></span></button>
        <button class="life-icon-btn" type="button" aria-label="设置"><span class="life-svg-icon icon-settings"></span></button>
      </div>
      </header>

      <section class="life-workspace">
        <div class="life-content" id="lifeContent"></div>
        <aside class="life-aside" id="lifeAside" aria-label="页面详情"></aside>
      </section>
    </main>
  </div>

  <div class="life-toast" id="lifeToast" role="status" aria-live="polite"></div>
  <script src="/life/assets/js/life-account.js?v=20260701-watch-link-default-1"></script>
  <script src="/life/assets/js/life-sync.js?v=20260701-watch-link-default-1"></script>
  <script src="/life/assets/js/life.js?v=20260715-persistent-image-uploads-1"></script>
</body>
</html>
